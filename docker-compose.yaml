services:
  postgres: 
    image: postgres:17
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d restaurant_db"]
      interval: 5s
      retries: 5
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: restaurant_db
    volumes:
      - "postgres-volume:/var/lib/postgresql/data"
      - "./init_db:/docker-entrypoint-initdb.d:ro"
    command: >
        postgres 
          -c wal_level=logical
          -c max_replication_slots=10
          -c max_wal_senders=10

  restaurant-producer:
    build: 
      context: ./restaurant_producer
    depends_on:
      init-connector:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: restaurant_db
    restart: "no"

  broker:
    container_name: broker
    image: apache/kafka:4.1.0
    ports:
      - "9092:9092"
      - "9094:9094"
      - "9102:9102"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIR: /var/lib/kafka/data
    volumes:
      - "kafka-data:/var/lib/kafka/data"

  kafka-connector:
    image: quay.io/debezium/connect:3.4
    ports:
      - "8083:8083"
    depends_on:
      - broker
    environment:
      GROUP_ID: debezium-connect
      BOOTSTRAP_SERVERS: broker:9092
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - broker
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9092

  init-connector:
    image: curlimages/curl:latest
    depends_on:
      - kafka-connector
    volumes:
      - ./connectors:/connectors:ro
    entrypoint: |-
      sh -c '
      until curl -sf http://kafka-connector:8083/connectors >/dev/null; do
        echo "waiting connect..."; sleep 2;
      done
    
      curl -X POST http://kafka-connector:8083/connectors \
        -H "Content-Type: application/json" \
        -d @/connectors/connector.json || true
      '


volumes:
  kafka-data:
  postgres-volume: