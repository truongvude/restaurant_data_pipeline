x-airflow-common:
  &airflow-common
  build: 
    context: ./airflow
    dockerfile: ./Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
  volumes:
    - ${AIRFLOW_PROJ_DIR:-./airflow}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-./airflow}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-./airflow}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-./airflow}/plugins:/opt/airflow/plugins
    - ./src/spark-job:/opt/airflow/spark-job
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres-airflow:
      condition: service_healthy

services:
  postgres: 
    image: postgres:17
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d restaurant_db"]
      interval: 5s
      retries: 5
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: restaurant_db
    volumes:
      - "postgres-volume:/var/lib/postgresql/data"
      - "./init_db:/docker-entrypoint-initdb.d:ro"
    command: >
        postgres 
          -c wal_level=logical
          -c max_replication_slots=10
          -c max_wal_senders=10
          -c timezone=Asia/Ho_Chi_Minh

  restaurant-producer:
    build: 
      context: ./restaurant_producer
    depends_on:
      init-connector:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: restaurant_db
    restart: "no"

  broker:
    container_name: broker
    image: apache/kafka:4.1.0
    ports:
      - "9092:9092"
      - "9094:9094"
      - "9102:9102"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIR: /var/lib/kafka/data
    volumes:
      - "kafka-data:/var/lib/kafka/data"

  kafka-connector:
    image: quay.io/debezium/connect:3.4
    ports:
      - "8083:8083"
    depends_on:
      - broker
    environment:
      GROUP_ID: debezium-connect
      BOOTSTRAP_SERVERS: broker:9092
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - broker
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9092

  init-connector:
    image: curlimages/curl:latest
    depends_on:
      - kafka-connector
    volumes:
      - ./connectors:/connectors:ro
    entrypoint: |-
      sh -c '
      until curl -sf http://kafka-connector:8083/connectors >/dev/null; do
        echo "waiting connect..."; sleep 2;
      done
    
      curl -X POST http://kafka-connector:8083/connectors \
        -H "Content-Type: application/json" \
        -d @/connectors/connector.json || true
      '
  minio:
    image: minio/minio
    ports:
      # API port
      - "9000:9000"
      # UI port
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command:
      - "server"
      - "/data"
      - "--console-address"
      - ":9001"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:9000/minio/health/live"]
      interval: 1s
      timeout: 10s
    volumes:
      - "minio-data:/data"
  
  init-bucket:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc
    environment:
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
      - AWS_REGION=us-east-1
    volumes:
      - ./minio/init-bucket.sh:/init-bucket.sh
    entrypoint: sh ./init-bucket.sh

  postgres-polaris:
    image: postgres:17
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d polaris_db"]
      interval: 5s
      retries: 5
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: polaris_db
    volumes:
      - "postgres-polaris-volume:/var/lib/postgresql/data"

  polaris:
    image: apache/polaris:latest
    ports:
      # API port
      - "8181:8181"
      # Optional, allows attaching a debugger to the Polaris JVM
      - "5005:5005"
    depends_on:
      minio:
        condition: service_healthy
      init-bucket:
        condition: service_completed_successfully
      postgres-polaris:
        condition: service_healthy
      polaris-bootstrap:
        condition: service_completed_successfully
    environment:
      JAVA_DEBUG: true
      JAVA_DEBUG_PORT: "*:5005"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
      POLARIS_REALM_CONTEXT_REALMS: POLARIS
      QUARKUS_OTEK_SDK_DISABLED: true
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_USERNAME: root
      QUARKUS_DATASOURCE_PASSWORD: root
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres-polaris:5432/polaris_db
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s

  polaris-bootstrap:
    image: apache/polaris-admin-tool:latest
    depends_on:
      postgres-polaris:
        condition: service_healthy
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_USERNAME: root
      QUARKUS_DATASOURCE_PASSWORD: root
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres-polaris:5432/polaris_db
    command: 
      - "bootstrap"
      - "--realm=POLARIS"
      - "--credential=POLARIS,root,s3cr3t"


  polaris-setup:
    image: alpine/curl:8.17.0
    depends_on:
      polaris:
        condition: service_healthy
      init-bucket:
        condition: service_completed_successfully
    environment:
      - CLIENT_ID=root
      - CLIENT_SECRET=s3cr3t
    volumes:
      - ./polaris/obtain-token.sh:/obtain-token.sh
      - ./polaris/create-catalog.sh:/create-catalog.sh
    entrypoint: "/bin/sh"
    command:
      - "-c"
      - >-
        source /obtain-token.sh &&
        echo Creating catalog... &&
        export STORAGE_CONFIG_INFO='{"storageType":"S3",
          "endpoint":"http://minio:9000",
          "endpointInternal":"http://minio:9000",
          "pathStyleAccess":true}' &&
        export STORAGE_LOCATION='s3://lakehouse' &&
        sh /create-catalog.sh POLARIS $$TOKEN &&
        echo Extra grants... &&
        curl \
          --fail-with-body \
          -H "Authorization: Bearer $$TOKEN" \
          -H 'Content-Type: application/json' \
          -X PUT \
          http://polaris:8181/api/management/v1/catalogs/prod/catalog-roles/catalog_admin/grants \
          -d '{"type":"catalog", "privilege":"CATALOG_MANAGE_CONTENT"}' &&
        echo Done. &&
        touch /tmp/polaris-setup-done &&
        tail -f /dev/null
    healthcheck:
      interval: 1s
      timeout: 10s
      retries: 240
      test: ["CMD", "test", "-f", "/tmp/polaris-setup-done"]


  spark-master:
    # This is a standalone deployment mode for Apache Spark
    build: ./spark/
    container_name: spark-master
    depends_on:
      polaris:
        condition: service_healthy
    environment:
      - SPARK_MODE=master
    env_file:
      - .env
    ports:
      - "8081:8080"
      - "7077:7077"
    command: bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    # This is a worker node for the standalone Spark cluster
    build: ./spark/
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=5
      - SPARK_WORKER_MEMORY=5g
    env_file:
      - .env
    depends_on:
      - spark-master

  spark-worker-2:
    # This is a worker node for the standalone Spark cluster
    build: ./spark/
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=5
      - SPARK_WORKER_MEMORY=5g
    env_file:
      - .env
    depends_on:
      - spark-master

  init-lakehouse:
    build: ./spark/
    env_file:
      - .env
    depends_on:
      - spark-worker-2
    environment:
      - SPARK_DRIVER_HOST=init-lakehouse
    command: >
      /opt/bitnami/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --conf spark.ui.port=4042
      --py-files /opt/bitnami/spark/spark-job/lib.zip
      /opt/bitnami/spark/spark-job/init_lakehouse.py
    volumes:
      - ./src/spark-job:/opt/bitnami/spark/spark-job


  streaming-bronze-orders:
    build: ./spark/
    depends_on:
      init-lakehouse:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "4042:4042"
    environment:
      - SPARK_DRIVER_HOST=streaming-bronze-orders
    command: >
      /opt/bitnami/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --conf spark.ui.port=4042
      --py-files /opt/bitnami/spark/spark-job/lib.zip
      --total-executor-cores 1
      --executor-cores 1
      /opt/bitnami/spark/spark-job/bronze/bronze_order_tables.py
      --table orders
      --kafka_bootstrap_servers broker:9092
      --topic restaurant.public.orders
    volumes:
      - ./src/spark-job:/opt/bitnami/spark/spark-job

  streaming-bronze-order-items:
    build: ./spark/
    depends_on:
      init-lakehouse:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "4043:4042"
    environment:
      - SPARK_DRIVER_HOST=streaming-bronze-order-items
    command: >
      /opt/bitnami/spark/bin/spark-submit
      --master spark://spark-master:7077
      --deploy-mode client
      --conf spark.ui.port=4042
      --py-files /opt/bitnami/spark/spark-job/lib.zip
      --total-executor-cores 1
      --executor-cores 1
      /opt/bitnami/spark/spark-job/bronze/bronze_order_tables.py
      --table order_items
      --kafka_bootstrap_servers broker:9092
      --topic restaurant.public.order_items
    volumes:
      - ./src/spark-job:/opt/bitnami/spark/spark-job

  postgres-airflow:
    image: postgres:17
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    volumes:
      - postgres-airflow-volume:/var/lib/postgresql/data

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: airflow-scheduler
    # networks:
    #   - airflow-spark-minio
    #   - airflow-internal
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          export AIRFLOW_UID=$$(id -u)
        fi
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}

    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on
      
  trino-coordinator:
    container_name: trino-coordinator
    image: trinodb/trino:477
    ports:
      - 8082:8080
    volumes:
      - ./trino/config/coordinator/config.properties:/etc/trino/config.properties
      - ./trino/config/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties
  
  trino-worker:
    container_name: trino-worker-1
    image: trinodb/trino:477
    volumes:
      - ./trino/config/worker/config.properties:/etc/trino/config.properties
      - ./trino/config/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties
    depends_on:
      - trino-coordinator

  metabase:
    container_name: metabase
    image: metabase/metabase
    volumes:
      - metabase-data:/metabase.db/
    ports:
      - "3000:3000"
  

volumes:
  kafka-data:
  postgres-volume:
  postgres-polaris-volume:
  minio-data: 
  postgres-airflow-volume:
  metabase-data: